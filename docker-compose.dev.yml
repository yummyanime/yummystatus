name: yummystatus

services:
    db:
        image: postgres:13
        ports:
            - "5432:5432"
        environment:
            - POSTGRES_USER=${DB_USER}
            - POSTGRES_PASSWORD=${DB_PASSWORD}
            - POSTGRES_DB=yummystatus
        volumes:
            - pgdata:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d yummystatus"]
            interval: 3s
            timeout: 3s
            retries: 10

    app:
        image: oven/bun:1-alpine
        working_dir: /app
        command: >
            sh -c "bun install --frozen-lockfile || bun install;
            bunx concurrently 'bun server/index.js' 'bunx vite client --config client/vite.config.ts --host'"
        env_file: .env
        ports:
            - "5173:5173"
            - "3000:3000"
        volumes:
            - ./:/app
            - app_node_modules:/app/node_modules
        depends_on:
            db:
                condition: service_healthy

volumes:
    pgdata:
    app_node_modules:
