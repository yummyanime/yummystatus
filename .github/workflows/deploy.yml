name: CI/CD Docker

on:
    push:
        branches:
            - main

jobs:
    build-and-push:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
        steps:
            - name: Checkout
              uses: actions/checkout@v3

            - name: Compute image name
              id: meta
              run: echo "image=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

            - name: Login to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and push
              uses: docker/build-push-action@v5
              with:
                  context: .
                  push: true
                  tags: ${{ steps.meta.outputs.image }}:latest

    deploy:
        needs: build-and-push
        runs-on: ubuntu-latest
        steps:
            - name: Deploy to server
              uses: appleboy/ssh-action@master
              with:
                  host: ${{ secrets.HOST }}
                  username: root
                  key: ${{ secrets.SSH_PRIVATE_KEY }}
                  port: 22
                  script: |
                      if [ ! -d "yummystatus" ]; then
                        git clone https://github.com/${{ github.repository }}.git yummystatus
                      fi
                      cd yummystatus
                      git reset --hard HEAD
                      git pull
                      if [ ! -f /usr/local/lib/docker/cli-plugins/docker-compose ]; then
                        echo "Installing docker compose plugin v2.24.6"
                        sudo mkdir -p /usr/local/lib/docker/cli-plugins
                        sudo curl -SL "https://github.com/docker/compose/releases/download/v2.24.6/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/lib/docker/cli-plugins/docker-compose
                        sudo chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
                      else
                        echo "docker compose plugin already exists, skipping installation"
                      fi
                      echo "DB_USER=${{ secrets.DB_USER }}" > .env
                      echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
                      echo "GLOBALPING_API_KEY=${{ secrets.GLOBALPING_API_KEY }}" >> .env
                      echo "GLOBALPING_API_KEY2=${{ secrets.GLOBALPING_API_KEY2 }}" >> .env
                      echo "GLOBALPING_API_KEY3=${{ secrets.GLOBALPING_API_KEY3 }}" >> .env
                      echo "GLOBALPING_API_KEY4=${{ secrets.GLOBALPING_API_KEY4 }}" >> .env
                      echo "GLOBALPING_API_KEY5=${{ secrets.GLOBALPING_API_KEY5 }}" >> .env
                      echo "GLOBALPING_API_KEY6=${{ secrets.GLOBALPING_API_KEY6 }}" >> .env
                      echo "GLOBALPING_SECRET_KEY=${{ secrets.GLOBALPING_SECRET_KEY }}" >> .env
                      echo "PSI_API_KEY=${{ secrets.PSI_API_KEY }}" >> .env
                      sudo docker system prune -a -f || true
                      
                      echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
                      export IMAGE="ghcr.io/$(echo '${{ github.repository }}' | tr 'A-Z' 'a-z')"
                      docker compose pull
                      docker compose up -d
