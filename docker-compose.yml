name: yummystatus

services:
    app:
        image: ${IMAGE}

        ports:
            - "80:80"
            - "443:443"
        depends_on:
            - db
        volumes:
            - /etc/letsencrypt:/etc/letsencrypt:ro
            - /var/www/certbot:/var/www/certbot:ro
        environment:
            - DB_USER=${DB_USER}
            - DB_PASSWORD=${DB_PASSWORD}
            - GLOBALPING_API_KEY=${GLOBALPING_API_KEY}
            - GLOBALPING_API_KEY2=${GLOBALPING_API_KEY2}
            - GLOBALPING_API_KEY3=${GLOBALPING_API_KEY3}
            - GLOBALPING_API_KEY4=${GLOBALPING_API_KEY4}
            - GLOBALPING_API_KEY5=${GLOBALPING_API_KEY5}
            - GLOBALPING_API_KEY6=${GLOBALPING_API_KEY6}
            - GLOBALPING_SECRET_KEY=${GLOBALPING_SECRET_KEY}
            - PSI_API_KEY=${PSI_API_KEY}
        restart: always

    db:
        image: postgres:13
        ports:
            - "5432:5432"
        environment:
            - POSTGRES_USER=${DB_USER}
            - POSTGRES_PASSWORD=${DB_PASSWORD}
            - POSTGRES_DB=yummystatus
        volumes:
            - pgdata:/var/lib/postgresql/data
        restart: always

volumes:
    pgdata:
